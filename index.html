<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestão de Produtos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Tokens ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f14;
      --surface:  #161a23;
      --card:     #1c2030;
      --border:   #2a3147;
      --accent:   #5b7cfa;
      --accent2:  #ff6b6b;
      --success:  #3ecf8e;
      --warning:  #f7b731;
      --text:     #e8ecf5;
      --muted:    #6b7898;
      --radius:   12px;
      --shadow:   0 4px 24px rgba(0,0,0,.45);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -.02em;
    }
    header h1 span { color: var(--accent); }
    .header-stats { display: flex; gap: 1.5rem; }
    .stat { text-align: center; }
    .stat-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--accent); }
    .stat-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

    /* ── Layout ──────────────────────────────────────── */
    main { max-width: 1280px; margin: 0 auto; padding: 2rem; }

    /* ── Toolbar ─────────────────────────────────────── */
    .toolbar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-wrap {
      flex: 1;
      min-width: 220px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: .65rem 1rem .65rem 2.5rem;
      font-family: inherit;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap svg {
      position: absolute;
      left: .75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 16px; height: 16px;
      pointer-events: none;
    }
    select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: .65rem 1rem;
      font-family: inherit;
      font-size: .9rem;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: var(--accent); }

    /* ── Buttons ─────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .65rem 1.25rem;
      border-radius: var(--radius);
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: .85rem;
      cursor: pointer;
      transition: all .2s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #4a6cf7; transform: translateY(-1px); }
    .btn-danger  { background: var(--accent2); color: #fff; }
    .btn-danger:hover  { background: #e55555; }
    .btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover   { background: var(--border); color: var(--text); }
    .btn-success { background: var(--success); color: #0d1a12; }
    .btn-success:hover { background: #30bf78; }
    .btn-sm { padding: .4rem .75rem; font-size: .78rem; }

    /* ── Table ───────────────────────────────────────── */
    .table-wrap {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    table { width: 100%; border-collapse: collapse; }
    thead {
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    th {
      text-align: left;
      padding: .9rem 1rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }
    td { padding: .85rem 1rem; font-size: .88rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr { transition: background .15s; }
    tbody tr:hover { background: rgba(91,124,250,.06); }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: .25rem .6rem;
      border-radius: 6px;
      font-size: .73rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge-ativo    { background: rgba(62,207,142,.15); color: var(--success); }
    .badge-inativo  { background: rgba(255,107,107,.15); color: var(--accent2); }
    .badge-cat      { background: rgba(91,124,250,.15); color: var(--accent); }

    .preco { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--success); }
    .estoque-low { color: var(--accent2); }

    .actions { display: flex; gap: .4rem; }

    /* ── Empty ───────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
    }
    .empty svg { width: 48px; height: 48px; margin-bottom: 1rem; opacity: .4; }

    /* ── Modal ───────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 540px;
      box-shadow: var(--shadow);
      animation: slideIn .25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
    }
    .modal-body { padding: 1.5rem; display: grid; gap: 1rem; }
    .modal-footer {
      display: flex;
      gap: .75rem;
      justify-content: flex-end;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }
    .close-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: .25rem;
      border-radius: 6px;
      display: flex;
    }
    .close-btn:hover { color: var(--text); background: var(--border); }

    /* ── Form Fields ─────────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: .4rem; }
    .field label {
      font-size: .78rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .field input,
    .field textarea,
    .field select {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: .6rem .85rem;
      font-family: inherit;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }
    .field input:focus,
    .field textarea:focus,
    .field select:focus { border-color: var(--accent); }
    .field textarea { min-height: 80px; resize: vertical; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    /* ── Confirm Dialog ──────────────────────────────── */
    #confirm-overlay .modal { max-width: 380px; }
    #confirm-msg { color: var(--muted); font-size: .9rem; margin-top: .25rem; }

    /* ── Toast ───────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .85rem 1.25rem;
      font-size: .88rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: .6rem;
      box-shadow: var(--shadow);
      transform: translateY(6rem);
      opacity: 0;
      transition: all .35s cubic-bezier(.34,1.56,.64,1);
      z-index: 300;
      max-width: 320px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.ok   { border-color: var(--success); }
    #toast.err  { border-color: var(--accent2); }
    #toast .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    #toast.ok .dot { background: var(--success); }
    #toast.err .dot { background: var(--accent2); }

    /* ── Loading ─────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 768px) {
      .header-stats { display: none; }
      th:nth-child(3), td:nth-child(3),
      th:nth-child(5), td:nth-child(5) { display: none; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────── -->
<header>
  <h1>Produto<span>Hub</span></h1>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-value" id="total-stat">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="ativos-stat">—</div>
      <div class="stat-label">Ativos</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="estoque-stat">—</div>
      <div class="stat-label">Em Estoque</div>
    </div>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────── -->
<main>
  <div class="toolbar">
    <div class="search-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="text" placeholder="Buscar produtos…" />
    </div>
    <select id="filtro-cat">
      <option value="">Todas as categorias</option>
    </select>
    <button class="btn btn-primary" onclick="abrirModal()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      Novo Produto
    </button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Produto</th>
          <th>Categoria</th>
          <th>Preço</th>
          <th>Estoque</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="7" class="empty"><div class="spinner"></div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- ── Modal Produto ────────────────────────────────────── -->
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Novo Produto</h2>
      <button class="close-btn" onclick="fecharModal()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="produto-id" />
      <div class="field">
        <label>Nome do Produto *</label>
        <input id="f-nome" type="text" placeholder="Ex: Smartphone Galaxy S24" />
      </div>
      <div class="field">
        <label>Descrição</label>
        <textarea id="f-desc" placeholder="Descreva o produto…"></textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Preço (R$) *</label>
          <input id="f-preco" type="number" step="0.01" min="0" placeholder="0,00" />
        </div>
        <div class="field">
          <label>Estoque</label>
          <input id="f-estoque" type="number" min="0" placeholder="0" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Categoria</label>
          <select id="f-cat">
            <option value="">Sem categoria</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="f-ativo">
            <option value="1">Ativo</option>
            <option value="0">Inativo</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>URL da Imagem</label>
        <input id="f-imagem" type="url" placeholder="https://…" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<!-- ── Confirm Dialog ───────────────────────────────────── -->
<div class="overlay" id="confirm-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Confirmar exclusão</h2>
      <button class="close-btn" onclick="fecharConfirm()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <p id="confirm-msg">Tem certeza que deseja excluir este produto?</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="fecharConfirm()">Cancelar</button>
      <button class="btn btn-danger" id="btn-confirmar">Excluir</button>
    </div>
  </div>
</div>

<!-- ── Toast ────────────────────────────────────────────── -->
<div id="toast"><span class="dot"></span><span id="toast-msg"></span></div>

<script>
// ── Config ────────────────────────────────────────────────
const API = 'api/produtos.php';

// ── Estado ────────────────────────────────────────────────
let produtos    = [];
let categorias  = [];
let confirmCb   = null;

// ── Init ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  carregarCategorias();
  carregarProdutos();

  const search   = document.getElementById('search');
  const filtroCat = document.getElementById('filtro-cat');

  let debounce;
  search.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(carregarProdutos, 350);
  });
  filtroCat.addEventListener('change', carregarProdutos);
});

// ── API Calls ─────────────────────────────────────────────
async function carregarCategorias() {
  try {
    const res = await fetch(`${API}?acao=categorias`);
    categorias = await res.json();

    const selFiltro = document.getElementById('filtro-cat');
    const selForm   = document.getElementById('f-cat');

    categorias.forEach(c => {
      selFiltro.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
      selForm.innerHTML   += `<option value="${c.id}">${c.nome}</option>`;
    });
  } catch(e) { console.error(e); }
}

async function carregarProdutos() {
  const busca = document.getElementById('search').value;
  const cat   = document.getElementById('filtro-cat').value;
  let url     = API;
  const params = new URLSearchParams();
  if (busca) params.set('busca', busca);
  if (cat)   params.set('categoria', cat);
  if ([...params].length) url += '?' + params.toString();

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '<tr><td colspan="7" class="empty"><div class="spinner"></div></td></tr>';

  try {
    const res  = await fetch(url);
    produtos   = await res.json();
    renderTabela();
    atualizarStats();
  } catch(e) {
    toast('Erro ao carregar produtos.', 'err');
    tbody.innerHTML = `<tr><td colspan="7" class="empty">Erro ao carregar dados.</td></tr>`;
  }
}

async function salvar() {
  const id    = document.getElementById('produto-id').value;
  const nome  = document.getElementById('f-nome').value.trim();
  const preco = parseFloat(document.getElementById('f-preco').value);

  if (!nome || isNaN(preco)) {
    toast('Preencha nome e preço.', 'err');
    return;
  }

  const payload = {
    nome,
    descricao:    document.getElementById('f-desc').value.trim(),
    preco,
    estoque:      parseInt(document.getElementById('f-estoque').value) || 0,
    categoria_id: document.getElementById('f-cat').value || null,
    imagem_url:   document.getElementById('f-imagem').value.trim(),
    ativo:        parseInt(document.getElementById('f-ativo').value),
  };

  const btn = document.getElementById('btn-salvar');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  try {
    const url    = id ? `${API}?id=${id}` : API;
    const method = id ? 'PUT' : 'POST';
    const res    = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();

    if (res.ok) {
      toast(data.mensagem, 'ok');
      fecharModal();
      carregarProdutos();
    } else {
      toast(data.erro || 'Erro ao salvar.', 'err');
    }
  } catch(e) {
    toast('Erro de conexão.', 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Salvar';
  }
}

async function excluir(id, nome) {
  document.getElementById('confirm-msg').textContent =
    `Tem certeza que deseja excluir "${nome}"? Esta ação não pode ser desfeita.`;

  confirmCb = async () => {
    fecharConfirm();
    try {
      const res  = await fetch(`${API}?id=${id}`, { method: 'DELETE' });
      const data = await res.json();
      if (res.ok) {
        toast(data.mensagem, 'ok');
        carregarProdutos();
      } else {
        toast(data.erro || 'Erro ao excluir.', 'err');
      }
    } catch(e) {
      toast('Erro de conexão.', 'err');
    }
  };

  document.getElementById('btn-confirmar').onclick = confirmCb;
  document.getElementById('confirm-overlay').classList.add('open');
}

// ── Render ────────────────────────────────────────────────
function renderTabela() {
  const tbody = document.getElementById('tbody');
  if (!produtos.length) {
    tbody.innerHTML = `
      <tr><td colspan="7" class="empty">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM16 3H8L6 7h12l-2-4z"/>
        </svg>
        <div>Nenhum produto encontrado</div>
      </td></tr>`;
    return;
  }

  tbody.innerHTML = produtos.map(p => `
    <tr>
      <td><span style="color:var(--muted);font-size:.8rem">#${p.id}</span></td>
      <td>
        <div style="font-weight:500">${esc(p.nome)}</div>
        ${p.descricao ? `<div style="font-size:.78rem;color:var(--muted);margin-top:.15rem">${esc(p.descricao.substring(0,60))}${p.descricao.length>60?'…':''}</div>` : ''}
      </td>
      <td>${p.categoria_nome ? `<span class="badge badge-cat">${esc(p.categoria_nome)}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
      <td class="preco">R$ ${parseFloat(p.preco).toFixed(2).replace('.',',')}</td>
      <td class="${parseInt(p.estoque) <= 5 ? 'estoque-low' : ''}">${p.estoque} un.</td>
      <td><span class="badge ${parseInt(p.ativo) ? 'badge-ativo' : 'badge-inativo'}">${parseInt(p.ativo) ? 'Ativo' : 'Inativo'}</span></td>
      <td>
        <div class="actions">
          <button class="btn btn-ghost btn-sm" onclick='editar(${JSON.stringify(p)})'>✏️ Editar</button>
          <button class="btn btn-danger btn-sm"  onclick="excluir(${p.id}, '${esc(p.nome).replace(/'/g,"\\'")}')">🗑️</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function atualizarStats() {
  const ativos   = produtos.filter(p => parseInt(p.ativo)).length;
  const estoqueT = produtos.reduce((s, p) => s + parseInt(p.estoque), 0);
  document.getElementById('total-stat').textContent   = produtos.length;
  document.getElementById('ativos-stat').textContent  = ativos;
  document.getElementById('estoque-stat').textContent = estoqueT;
}

// ── Modal ─────────────────────────────────────────────────
function abrirModal(produto = null) {
  document.getElementById('modal-title').textContent = produto ? 'Editar Produto' : 'Novo Produto';
  document.getElementById('produto-id').value  = produto?.id || '';
  document.getElementById('f-nome').value      = produto?.nome || '';
  document.getElementById('f-desc').value      = produto?.descricao || '';
  document.getElementById('f-preco').value     = produto?.preco || '';
  document.getElementById('f-estoque').value   = produto?.estoque || 0;
  document.getElementById('f-cat').value       = produto?.categoria_id || '';
  document.getElementById('f-ativo').value     = produto?.ativo ?? 1;
  document.getElementById('f-imagem').value    = produto?.imagem_url || '';
  document.getElementById('modal-overlay').classList.add('open');
}

function editar(produto) { abrirModal(produto); }

function fecharModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function fecharConfirm() {
  document.getElementById('confirm-overlay').classList.remove('open');
}

// ── Toast ─────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3500);
}

// ── Helpers ───────────────────────────────────────────────
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Fechar modal ao clicar fora
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) fecharModal();
});
document.getElementById('confirm-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) fecharConfirm();
});
</script>
