# ============================================
# /etc/nginx/sites-available/crud-produtos
# Configuração Nginx para o CRUD de Produtos
# ============================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Raiz do site
    root /var/www/crud-produtos;

    # Arquivos de índice
    index index.html index.php;

    # Nome do servidor (troque pelo seu domínio ou IP)
    server_name _;

    # Charset
    charset utf-8;

    # Tamanho máximo de upload
    client_max_body_size 10M;

    # ---- Arquivos estáticos ----
    location / {
        try_files $uri $uri/ =404;
    }

    # ---- PHP via FastCGI ----
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_intercept_errors on;

        # Cabeçalhos de segurança
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Frame-Options "SAMEORIGIN";
    }

    # ---- Cache de assets ----
    location ~* \.(jpg|jpeg|gif|png|webp|svg|css|js|ico)$ {
        expires 7d;
        log_not_found off;
        access_log off;
    }

    # ---- Negar arquivos ocultos ----
    location ~ /\. {
        deny all;
    }

    # ---- Gzip ----
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;

    # Logs
    access_log /var/log/nginx/crud-produtos-access.log;
    error_log  /var/log/nginx/crud-produtos-error.log;
}
